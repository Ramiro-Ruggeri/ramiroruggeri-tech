# =============================================================
# nginx/ramiroruggeri.tech.conf
# Reverse proxy → Node (PM2) en :3000
# Copiar a:  /etc/nginx/sites-available/ramiroruggeri.tech
# Y enlazar: ln -s /etc/nginx/sites-available/ramiroruggeri.tech /etc/nginx/sites-enabled/
# Después: certbot --nginx -d ramiroruggeri.tech -d www.ramiroruggeri.tech
# =============================================================

server {
    listen 80;
    listen [::]:80;
    server_name ramiroruggeri.tech www.ramiroruggeri.tech;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS (after certbot fills the 443 block)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ramiroruggeri.tech www.ramiroruggeri.tech;

    # SSL — certbot writes these lines automatically when you run it.
    # ssl_certificate     /etc/letsencrypt/live/ramiroruggeri.tech/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ramiroruggeri.tech/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Proxy to Node (PM2)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
